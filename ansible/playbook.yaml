---
- name: Main task
  hosts: all
  gather_facts: true
  roles:
    - role: upgrade_packages
      tags: packages
    - role: install_packages_common
      tags: packages
    - role: install_packages_development
      when: "ansible_processor | select('search', 'Xeon') | list | length > 0"
      tags: packages

    - role: openssh_keypair
      tags: openssh
    - role: authorized_key
      when: "ansible_processor | select('search', 'Xeon') | list | length == 0"
      tags: openssh

    - role: git_config
      tags: git

    - role: crypt_policy
      vars:
        crypt_policy_name: "DEFAULT"
      when: "ansible_processor | select('search', 'Xeon') | list | length == 0"
      tags: crypt_policy
    - role: crypt_policy
      vars:
        crypt_policy_name: "LEGACY"
      when: "ansible_processor | select('search', 'Xeon') | list | length > 0"
      tags: crypt_policy
